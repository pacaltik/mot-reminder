spring.application.name=MotReminder

# MySQL Connection Settings
spring.datasource.url=jdbc:mysql://localhost:3306/mot_reminder_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Settings
# 'update' automatically creates/updates tables based on Java classes
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Email Configuration (Gmail)
spring.mail.host=smtp.seznam.cz
spring.mail.port=465
spring.mail.username=mot.reminder.pacalt@seznam.cz
spring.mail.password=Pacaltik007
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.socketFactory.port=465
spring.mail.properties.mail.smtp.socketFactory.class=javax.net.ssl.SSLSocketFactory
spring.mail.properties.mail.smtp.ssl.enable=true