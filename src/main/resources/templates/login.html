<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login - MOT Reminder</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/images/mot-icon.svg}">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="container">

    <h2>Login to MOT Reminder</h2>

    <div th:if="${error}" class="alert-error" th:text="${error}"></div>
    <!--/*@thymesVar id="successMessage" type=""*/-->
    <div th:if="${successMessage}" class="badge badge-valid">
        <span th:text="${successMessage}"></span>
    </div>
    
    <form th:action="@{/login}" method="post">

        <div class="form-group">
            <label>Email address:
                <input type="email" name="email" placeholder="name@example.com" required>
            </label>
        </div>

        <div class="form-group">
            <label>Password:
                <input type="password" name="password" required>
            </label>
        </div>

        <button type="submit" class="btn btn-primary">Log In</button>

    </form>

    <p style="margin-top: 1.5rem;">Don't have an account?
        <a th:href="@{/register}" style="color: var(--primary-color);">Register here</a></p>

</div>
</body>
</html>
