<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>MOT Reminder</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f9;
            color:#333;
        }
        header{
            background-color: #2c3e50;
            color: white;
            padding: 1rem;
            text-align: center;
        }
        .container{
            max-width: 800px;
            margin: 2rem auto;
            text-align:center;
            padding: 2rem center;
            background:white;
            box-shadow:0 4px 6px rgba(0,0,0,0.1);
            border-radius: 8px;
        }
        .btn{
            display: inline-block;
            padding: 10px 20px;
            background-color: #3498db;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            margin-top: 20px;
        }
        .btn:hover{
            background-color: #2980b9;
        }
    </style>
</head>
<body>
    <header>
        <h1>MOT Reminder</h1>
    </header>
    <div class="container">
        <h2>Never miss your car inspection again!</h2>
        <p>Keep track of your vehicle's technical inspection dates and receive email notifications automatically.</p>

        <a href="/login" class="btn">Log In</a>
        <a href="/register" class="btn" style="background-color: #27ae60;">Register</a>
    </div>
</body>
</html>
