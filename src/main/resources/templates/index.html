<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>MOT Reminder</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/images/mot-icon.svg}">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="container" style="text-align: center; padding: 4rem 2rem;">
    <h1 style="border-bottom: none; font-size: 2.5rem; color: var(--primary-color); margin-bottom: 0.5rem;">MOT Reminder</h1>
    <p style="font-size: 1.2rem; color: #666; margin-bottom: 2.5rem;">Never miss your MOT expiration date again. Keep track of all your vehicles securely in one place.</p>

    <div>
        <a th:href="@{/login}" class="btn btn-primary" style="margin-right: 1rem; min-width: 150px;">Log In</a>
        <a th:href="@{/register}" class="btn" style="background-color: var(--border-color); color: var(--text-color); min-width: 150px;">Register</a>
    </div>
</div>
</body>
</html>
