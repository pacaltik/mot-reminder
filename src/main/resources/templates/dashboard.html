<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #ddd; padding-bottom: 10px; }
        .logout { color: red; text-decoration: none; }
    </style>
</head>
<body>

<header>
    <h2>My Dashboard</h2>
    <div>
        <span>Logged in as: <b th:text="${user.email}"></b></span>
        |
        <a href="/logout" class="logout">Logout</a>
    </div>
</header>

<div style="margin-top: 30px;">
    <div style="display: flex; justify-content: space-between; align-items: center;">
        <h3>My Cars</h3>
        <a href="/add-car" style="background: #3498db; color: white; padding: 10px; text-decoration: none; border-radius: 5px;">+ Add Car</a>
    </div>

    <hr>

    <p th:if="${cars.empty}">You don't have any cars monitored yet.</p>

    <table th:if="${!cars.empty}" style="width: 100%; text-align: left; border-collapse: collapse;">
        <thead>
        <tr style="background: #eee;">
            <th style="padding: 10px;">License Plate</th>
            <th style="padding: 10px;">Expires On</th>
            <th style="padding: 10px;">Status</th>
            <th style="padding: 10px;">Action</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="car : ${cars}" style="border-bottom: 1px solid #ddd;">
            <td style="padding: 10px;">
                <b th:text="${car.licensePlate}"></b>
            </td>

            <td style="padding: 10px;" th:text="${car.motExpiryDate}"></td>

            <td style="padding: 10px;">
                        <span th:if="${car.motExpiryDate.isBefore(T(java.time.LocalDate).now())}"
                              style="color: red; font-weight: bold;">
                            EXPIRED!
                        </span>

                <span th:if="${!car.motExpiryDate.isBefore(T(java.time.LocalDate).now())}"
                      style="color: green; font-weight: bold;">
                            Valid
                        </span>
            </td>

            <td style="padding: 10px;">
                <form action="/delete-car" method="post" onsubmit="return confirm('Are you sure?');">
                    <input type="hidden" name="carId" th:value="${car.id}" />
                    <button type="submit" style="background: #e74c3c; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer;">
                        Delete
                    </button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</div>

</body>
</html>
</body>
</html>
