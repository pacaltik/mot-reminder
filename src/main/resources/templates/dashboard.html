<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - My Garage</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/images/mot-icon.svg}">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Set min date for MOT Expiry (Today)
            const today = new Date().toISOString().split('T')[0];
            const dateInputs = document.querySelectorAll('input[type="date"]');
            dateInputs.forEach(input => {
                input.setAttribute('min', today);
            });

            // License Plate Regex for Client-side Validation
            const plateRegex = /^(([ABCDEFHIJKLMNPRSTUVXYZ]|[0-9])-?){5,8}$/;
            const plateInput = document.querySelector('input[name="licensePlate"]');
            if (plateInput) {
                plateInput.addEventListener('input', function() {
                    this.value = this.value.toUpperCase().replace(/[^A-Z0-9-]/g, '');
                    if (!plateRegex.test(this.value)) {
                        this.setCustomValidity('Invalid format. Use 5-8 characters (A-Z, 0-9).');
                    } else {
                        this.setCustomValidity('');
                    }
                });
            }
        });

        function confirmDelete(carId) {
            // "add quote if you really want to do that"
            return confirm("Are you sure you want to delete this car? This action cannot be fully undone.");
        }

        function openEditModal(carId, licensePlate, currentExpiry) {
            const modal = document.getElementById('editModal');
            document.getElementById('editCarId').value = carId;
            document.getElementById('editLicensePlate').value = licensePlate;
            document.getElementById('editExpiryDate').value = currentExpiry;
            modal.style.display = 'block';
        }

        function closeEditModal() {
            document.getElementById('editModal').style.display = 'none';
        }

        function addTime(days) {
            const dateInput = document.getElementById('editExpiryDate');
            if (!dateInput.value) {
                // Default to today if empty? Or do nothing?
                dateInput.value = new Date().toISOString().split('T')[0];
            }
            
            const current = new Date(dateInput.value);
            // Add days
            current.setDate(current.getDate() + days);
            
            // Format to YYYY-MM-DD
            const newDate = current.toISOString().split('T')[0];
            dateInput.value = newDate;
        }

        function addYears(years) {
             const dateInput = document.getElementById('editExpiryDate');
            if (!dateInput.value) {
                dateInput.value = new Date().toISOString().split('T')[0];
            }
            const current = new Date(dateInput.value);
            current.setFullYear(current.getFullYear() + years);
            const newDate = current.toISOString().split('T')[0];
            dateInput.value = newDate;
        }
        
        // Close modal if user clicks outside
        window.onclick = function(event) {
            const modal = document.getElementById('editModal');
            if (event.target == modal) {
                modal.style.display = "none";
            }
        }
    </script>
</head>
<body>
<div class="container" style="max-width: 1000px;">

    <!-- Header -->
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; border-bottom: 2px solid var(--border-color); padding-bottom: 1rem;">
        <h1 style="border: none; margin: 0;">My Garage</h1>
        <div style="font-size: 1.1rem;">
            <span style="color: #666;">Welcome,</span>
            <strong th:text="${user.email}"></strong> |
            <a th:href="@{/logout}" style="color: var(--danger-color); text-decoration: none; font-weight: bold; margin-left: 10px;">Logout</a>
        </div>
    </div>

    <!-- Messages -->
    <div th:if="${successMessage}" class="alert-success" style="background-color: #d1e7dd; color: #0f5132; padding: 1rem; border-radius: 6px; margin-bottom: 1rem;">
        <span th:text="${successMessage}"></span>
    </div>
    <div th:if="${errorMessage}" class="alert-error">
        <span th:text="${errorMessage}"></span>
    </div>

    <!-- Add Car Form -->
    <div style="background-color: #f8f9fa; padding: 1.5rem; border-radius: 8px; border: 1px solid var(--border-color); margin-bottom: 2rem;">
        <h3 style="margin-top: 0; margin-bottom: 1rem; color: var(--text-color);">Add New Car</h3>

        <form th:action="@{/add-car}" method="post" style="display: flex; gap: 1rem; align-items: flex-end; flex-wrap: wrap;">
            <div class="form-group" style="margin-bottom: 0; flex: 1; min-width: 200px;">
                <label>License Plate:
                <input type="text" name="licensePlate" placeholder="e.g. 1A2 3456" required>
                </label>
                <small style="color: #666;">Format: 5-8 chars (A-Z, 0-9)</small>
            </div>
            <div class="form-group" style="margin-bottom: 0; flex: 1; min-width: 200px;">
                <label>MOT Expiry Date:
                <input type="date" name="motExpiryDate" required>
                </label>
                <small style="color: #666;">Must be today or future</small>
            </div>
            <button type="submit" class="btn btn-primary" style="height: 45px;">Add Car</button>
        </form>
    </div>

    <!-- Car List Table -->
    <div th:if="${not #lists.isEmpty(cars)}">
        <table class="mot-table">
            <thead>
            <tr style="height: 50px; background: #f8f9fa;">
                <th>License Plate</th>
                <th>Expiry Date</th>
                <th>Days Left</th> 
                <th>Status</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="car : ${cars}" style="height: 60px; border-bottom: 1px solid #eee;">
                <td style="font-weight: bold;" th:text="${car.licensePlate}"></td>
                <td th:text="${#temporals.format(car.motExpiryDate, 'dd.MM.yyyy')}"></td>

                <td>
                    <div th:with="days=${car.getDaysRemaining()}"
                         th:style="'display: inline-block; padding: 5px 12px; border-radius: 4px; font-weight: bold; min-width: 80px; text-align: center; ' +
                               (${days <= 0} ? 'background-color: #ff4d4d; color: white;' :
                               (${days <= 30} ? 'background-color: #ffa500; color: white;' : 'background-color: #2ecc71; color: white;'))">
                        <span th:text="${days > 0 ? days + ' days' : 'EXPIRED'}"></span>
                    </div>
                </td>

                <td>
                <span th:class="${car.status.name() == 'VALID' ? 'badge-valid' : 
                            (car.status.name() == 'EXPIRING_IN_MONTH' ? 'badge-expiring-month' : 
                            (car.status.name() == 'EXPIRING_IN_WEEK' ? 'badge-expiring-week' : 'badge-expired'))}"
                      th:text="${car.status}"
                      style="padding: 5px 10px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; border: 1px solid;">
                </span>
                </td>
                
                <td>
                    <div style="display: flex; justify-content: center; gap: 5px;">
                        <!-- Edit Button -->
                        <button type="button"
                                class="btn btn-edit"
                                th:data-id="${car.id}"
                                th:data-plate="${car.licensePlate}"
                                th:data-expiry="${car.motExpiryDate}"
                                onclick="openEditModal(this.getAttribute('data-id'), this.getAttribute('data-plate'), this.getAttribute('data-expiry'))">
                            Edit
                        </button>
                        
                        <!-- Delete Button -->
                        <form th:action="@{/delete-car}" method="post" onsubmit="return confirmDelete()">
                            <input type="hidden" name="carId" th:value="${car.id}">
                            <button type="submit" class="btn btn-danger">Delete</button>
                        </form>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <!-- Empty State -->
    <div th:if="${#lists.isEmpty(cars)}" style="text-align: center; padding: 3rem 1rem; color: #6c757d; background-color: #f8f9fa; border-radius: 8px; border: 2px dashed var(--border-color);">
        <h3 style="margin-bottom: 0.5rem; color: var(--text-color);">Your garage is empty</h3>
        <p>Add your first car using the form above to start tracking its MOT.</p>
    </div>

</div>

<!-- Edit Modal -->
<div id="editModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeEditModal()">&times;</span>
        <h2>Edit Car MOT</h2>
        <form th:action="@{/update-car-expiry}" method="post">
            <input type="hidden" id="editCarId" name="carId">
            
            <div class="form-group">
                <label>License Plate (Read-only):</label>
                <input type="text" id="editLicensePlate" readonly style="background-color: #e9ecef; cursor: not-allowed;">
            </div>
            
            <div class="form-group">
                <label>New MOT Expiry Date:</label>
                <input type="date" id="editExpiryDate" name="newExpiryDate" required>
                
                <div class="fast-buttons-container">
                    <button type="button" class="btn btn-fast" onclick="addTime(30)">+30 Days</button>
                    <button type="button" class="btn btn-fast" onclick="addYears(2)">+2 Years</button>
                </div>
            </div>
            
            <div style="text-align: right; margin-top: 1.5rem;">
                <button type="button" class="btn btn-danger" onclick="closeEditModal()" style="margin-right: 10px;">Cancel</button>
                <button type="submit" class="btn btn-primary">Save Changes</button>
            </div>
        </form>
    </div>
</div>

</body>
</html>
