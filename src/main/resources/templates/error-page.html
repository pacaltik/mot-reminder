<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <title>Error</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/images/mot-icon.svg}">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="container" style="text-align: center; padding: 4rem 2rem;">

    <h1 style="color: var(--danger-color); border-bottom: none; font-size: 4rem; margin-bottom: 0;">Oops!</h1>
    <h2 style="border-bottom: none; color: var(--text-color);">Something went wrong</h2>

    <div class="alert-error" style="margin: 2rem auto; max-width: 500px; font-size: 1.1rem; text-align: left;">
        <strong style="display: block; margin-bottom: 0.5rem;">Error details:</strong>
        <!--/*@thymesVar id="errorMessage" type=""*/-->
        <span th:text="${errorMessage}">An unexpected error occurred.</span>
    </div>

    <a th:href="@{/}" class="btn btn-primary">Return to Home Page</a>
</div>
</body>
</html>
