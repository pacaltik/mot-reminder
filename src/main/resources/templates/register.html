<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Register - MOT Reminder</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/mot-icon.svg}">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="container">
    <h2>Create an Account</h2>

    <div th:if="${error}" class="alert-error" th:text="${error}"></div>

    <form th:action="@{/register}" th:object="${user}" method="post">

        <div class="form-group">
            <label>Email address:
            <input type="email" th:field="*{email}" placeholder="name@example.com">
            </label>
            <div th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="error-msg"></div>
        </div>

        <div class="form-group">
            <label>Password:
            <input type="password" th:field="*{password}" placeholder="At least 6 characters">
            </label>
            <div th:if="${#fields.hasErrors('password')}" th:errors="*{password}" class="error-msg"></div>
        </div>

        <button type="submit" class="btn btn-primary">Register</button>
    </form>

    <p style="margin-top: 1.5rem;">Already have an account? <a th:href="@{/login}" style="color: var(--primary-color); font-weight: bold; text-decoration: none;">Log in here</a></p>
</div>
</body>
</html>
