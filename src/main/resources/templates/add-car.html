<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add New Car</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/mot-icon.svg}">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="container">
    <h2>Add New Car</h2>

    <form th:action="@{/add-car}" th:object="${car}" method="post">

        <label for="spz">License Plate:</label>
        <input type="text" id="spz" th:field="*{licensePlate}" placeholder="e.g. 1A2 3456"
               style="text-transform: uppercase;">
        <div th:if="${#fields.hasErrors('licensePlate')}" th:errors="*{licensePlate}"
             style="color: red; font-size: 0.8em; margin-bottom: 10px;"></div>

        <label for="expiryDate">MOT Expiry Date:</label>
        <input type="date" id="expiryDate" th:field="*{motExpiryDate}">
        <div th:if="${#fields.hasErrors('motExpiryDate')}" th:errors="*{motExpiryDate}"
             style="color: red; font-size: 0.8em; margin-bottom: 10px;"></div>

        <button class="btn btn-primary" type="submit" style="margin-top: 10px;">Save Car</button>
        <a href="/dashboard" style="margin-left: 10px; text-decoration: none; color: #666;">Cancel</a>
    </form>
</div>
</body>
</html>
