version: '3.8'

services:
  # 1. Database
  db:
    image: mysql:8.0
    container_name: mot-mysql
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: mot_reminder_db
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql # storing data
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-ppassword"]
      interval: 10s
      timeout: 5s
      retries: 10

  # 2. Spring Boot
  app:
    build: .
    container_name: mot-app
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy # wait for launch
    environment:
      # 'localhost' to 'db'
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/mot_reminder_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      - DB_USERNAME=root
      - DB_PASSWORD=password
      # PASSWORD NEEDED
      - MAIL_USERNAME=mot.reminder.pacalt@seznam.cz
      - MAIL_PASSWORD=

volumes:
  db_data:
