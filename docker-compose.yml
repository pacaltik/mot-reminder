services:
  # 1. Database
  db:
    image: mysql:8.0
    container_name: mot-mysql
    command: --innodb-use-native-aio=0
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: mot_reminder_db
    ports:
      - "3306:3306"
    volumes:
      - db_data_v2:/var/lib/mysql # storing data
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u root -ppassword || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 180s

  # 2. Spring Boot
  app:
    build: .
    container_name: mot-app
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy # wait for launch
    environment:
      # 'localhost' to 'db'
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/mot_reminder_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      - DB_USERNAME=root
      - DB_PASSWORD=password
      # PASSWORD NEEDED
      - MAIL_USERNAME=mot.reminder.pacalt@seznam.cz
      - MAIL_PASSWORD=

volumes:
  db_data_v2:
